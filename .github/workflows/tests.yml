name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: tools/bin
          key: ${{ runner.os }}-s2replay-tools-${{ hashFiles('tools/go.sum') }}

      - name: Build
        run: go build ./...

      - name: Test
        run: make test

      - name: Lint
        run: make lint
